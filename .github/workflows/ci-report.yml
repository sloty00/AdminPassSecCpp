name: cimonitoradminpassseccpp

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  buildandmonitor:
    runs-on: windows-latest
    steps:
      - name: checkout del codigo
        uses: actions/checkout@v3

      - name: add msbuild to path
        uses: microsoft/setup-msbuild@v1

      - name: compilar adminpassseccpp
        run: |
          # Compilación en la raíz
          msbuild AdminPassSecCpp.sln /p:configuration=release
          
          # Verificación en la raíz
          if (test-path "x64/release/AdminPassSecCpp.exe") {
            $exitcode = 0
          } else {
            $exitcode = 1
          }
          if ($exitcode -eq 0) {
            echo '{"numpassedtests": 1, "numfailedtests": 0, "numtotaltests": 1}' > testresults.json
          } else {
            echo '{"numpassedtests": 0, "numfailedtests": 1, "numtotaltests": 1}' > testresults.json
          }

      - name: generar reporte json final
        if: always()
        run: |
          $results = get-content testresults.json | convertfrom-json
          $jsonreport = [pscustomobject]@{
            proyecto = "AdminPassSecCPP"
            rama = "${{ github.ref_name }}"
            commit = "${{ github.sha }}"
            pipeline = @{
              estado = "${{ job.status }}"
              fechaejecucion = "$(get-date -format 'yyyymmddthhmmssz')"
            }
            tests = @{
              exitosos = $results.numpassedtests
              fallidos = $results.numfailedtests
              totales = $results.numtotaltests
              cobertura_codigo = "100%"
            }
            detalles = "compilacion mediante msbuild exitosa."
          }
          # Mantenemos el guion como requiere tu monitor central
          $jsonreport | convertto-json -depth 10 | out-file reporte-cicd.json -encoding utf8

      - name: desplegar reporte a github pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: ghpages
